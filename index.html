<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfey Reji - First Webpage</title>
    <meta name="description" content="Welcome to Alfey Reji's personal webpage.">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #2b2b2b;
            --text: #f5f5f5;
            --muted: #b3b3b3;
            --font: "Segoe UI", Tahoma, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
        }

        .card {
            width: 100%;
            max-width: 640px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
        }

        h1 {
            font-size: 2rem;
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 18px;
        }

        .divider {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 18px 0;
        }

        p {
            line-height: 1.7;
            color: #dddddd;
            margin-bottom: 14px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0 18px;
        }

        .tag {
            border: 1px solid #3a3a3a;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.9rem;
            color: #e0e0e0;
            background: #141414;
        }

        footer {
            margin-top: 16px;
            font-size: 0.85rem;
            color: #9e9e9e;
        }

        @media (max-width: 520px) {
            .card {
                padding: 22px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Alfey Reji</h1>
        <p class="subtitle">A curious mind building things with code.</p>

        <hr class="divider">

        <p>Welcome to my first webpage. This is where my journey into web development begins.</p>

        <div class="tags" aria-label="About">
            <span class="tag">B.Tech Computer Science</span>
            <span class="tag">1st Year - 2nd Semester</span>
        </div>

        <p>I am keeping this page simple for now and will update it as I learn more.</p>

        <footer>Copyright 2026 Alfey Reji</footer>
    </main>
</body>
</html>
